<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReviewLens Ask AI</title>
    <link rel="stylesheet" href="./styles.css?v=20260709-evidence-room" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">RL</span>
          <span>ReviewLens</span>
        </div>
        <nav class="nav-list">
          <a class="nav-item" href="./">
            <span class="nav-dot primary"></span>
            Overview
          </a>
          <a class="nav-item" href="./backlog.html">
            <span class="nav-dot amber"></span>
            Backlog
          </a>
          <a class="nav-item active" href="./chat.html" aria-current="page">
            <span class="nav-dot green"></span>
            Ask AI
          </a>
        </nav>
        <div class="sidebar-card">
          <span>RAG assistant</span>
          <strong>Ask with context</strong>
          <p>Answers are grounded in retrieved review evidence from Qdrant.</p>
        </div>
      </aside>

      <main id="main-content" class="main chat-main" tabindex="-1">
        <section class="chat-layout" aria-label="Review intelligence chatbot">
          <div class="chat-panel">
            <div class="chat-start-heading">
              <span class="assistant-badge">ReviewLens AI</span>
              <h1>Ready when you are.</h1>
              <p>
                Ask ReviewLens anything about Instagram reviews, product pain,
                sentiment, or backlog priorities.
              </p>
            </div>

            <div
              id="chatMessages"
              class="chat-messages"
              aria-live="polite"
            ></div>

            <form id="chatForm" class="chat-form">
              <label class="sr-only" for="questionInput">Question</label>
              <textarea
                id="questionInput"
                rows="2"
                placeholder="Ask anything"
                required
              ></textarea>
              <button id="sendQuestion" type="submit">Send</button>
            </form>

            <div class="prompt-dock" aria-label="Prompt shortcuts">
              <button
                type="button"
                data-prompt="What are the top three product problems users mention most?"
              >
                Top problems
              </button>
              <button
                type="button"
                data-prompt="What should we put in the next sprint backlog based on review severity?"
              >
                Sprint backlog
              </button>
              <button
                type="button"
                data-prompt="Summarize the account suspension complaints and cite example reviews."
              >
                Account suspensions
              </button>
              <button
                type="button"
                data-prompt="Which issues look like support/process problems rather than engineering bugs?"
              >
                Support gaps
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./chat.js?v=20260709-evidence-room" defer></script>
  </body>
</html>
